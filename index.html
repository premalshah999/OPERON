<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SENTINEL — Financial Complaint Intelligence</title>
    <meta name="description" content="Sentinel: Financial complaint intelligence command center for regulatory compliance monitoring and enforcement risk analysis." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      body { background: #0A0A0A; margin: 0; }
      /* Prevent FOUC */
      #root { opacity: 0; transition: opacity 0.15s ease; }
      #root.loaded { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove FOUC guard once React hydrates
      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => {
          document.getElementById('root')?.classList.add('loaded');
        });
      });
    </script>
  </body>
</html>
